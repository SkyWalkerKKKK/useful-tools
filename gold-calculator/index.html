<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 金价计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px 12px 0 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
        }

        .card {
            background: white;
            border-radius: 0 0 12px 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 区域标题 */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
            margin: 25px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .section-title.current {
            border-bottom-color: #4a90d9;
        }

        .section-title.buy {
            border-bottom-color: #f5a623;
        }

        .form-group {
            margin-bottom: 24px;
        }

        /* 标签样式 - 独立色块 */
        label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
        }

        .label-current {
            background: linear-gradient(135deg, #4a90d9 0%, #357abd 100%);
        }

        .label-buy {
            background: linear-gradient(135deg, #f5a623 0%, #d48806 100%);
        }

        .label-icon {
            font-size: 1.2rem;
        }

        /* 输入框样式 */
        .input-wrapper {
            display: flex;
            border: 2px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
        }

        .input-wrapper.buy:focus-within {
            border-color: #f5a623;
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
        }

        input[type="number"] {
            flex: 1;
            padding: 16px 18px;
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            outline: none;
        }

        input[type="number"]::placeholder {
            color: #aaa;
        }

        .unit {
            padding: 16px 20px;
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
            font-size: 0.95rem;
            border-left: 1px solid #e0e0e0;
            min-width: 70px;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 8px;
            color: white;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .result-detail {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }

        .result-detail p {
            margin: 5px 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .rate-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .rate-info p {
            color: #333;
            font-size: 0.95rem;
        }

        .rate-info strong {
            color: #667eea;
        }

        .formula {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #666;
            border: 1px dashed #ddd;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 金价计算器</h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('average')">📊 均价计算</button>
            <button class="tab-btn" onclick="switchTab('london')">🌍 伦敦金转换</button>
        </div>

        <!-- 均价计算 Tab -->
        <div id="average-tab" class="tab-content active">
            <div class="card">
                <div class="formula">
                    <strong>公式：</strong>买入后均价 = (当前均价 × 当前克数 + 买入金价 × 买入克数) ÷ (当前克数 + 买入克数)
                </div>

                <div class="section-title current">💼 当前持仓</div>

                <div class="form-group">
                    <label class="label-current">
                        <span class="label-icon">💰</span>
                        当前均价
                    </label>
                    <div class="input-wrapper">
                        <input type="number" id="current-price" placeholder="例如：580" step="0.01">
                        <span class="unit">元/克</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label-current">
                        <span class="label-icon">⚖️</span>
                        当前克数
                    </label>
                    <div class="input-wrapper">
                        <input type="number" id="current-weight" placeholder="例如：100" step="0.01">
                        <span class="unit">克</span>
                    </div>
                </div>

                <div class="section-title buy">🛒 新买入</div>

                <div class="form-group">
                    <label class="label-buy">
                        <span class="label-icon">🏷️</span>
                        买入金价
                    </label>
                    <div class="input-wrapper buy">
                        <input type="number" id="buy-price" placeholder="例如：560" step="0.01">
                        <span class="unit">元/克</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label-buy">
                        <span class="label-icon">📦</span>
                        买入克数
                    </label>
                    <div class="input-wrapper buy">
                        <input type="number" id="buy-weight" placeholder="例如：50" step="0.01">
                        <span class="unit">克</span>
                    </div>
                </div>

                <button class="btn" onclick="calculateAverage()">计算买入后均价</button>

                <div class="result" id="average-result">
                    <div class="result-label">买入后均价</div>
                    <div class="result-value" id="average-value">--</div>
                    <div class="result-detail" id="average-detail"></div>
                </div>
            </div>
        </div>

        <!-- 伦敦金转换 Tab -->
        <div id="london-tab" class="tab-content">
            <div class="card">
                <div class="formula">
                    <strong>公式：</strong>国内价 = 伦敦价 × 汇率 ÷ 31.1035 &nbsp;|&nbsp; 伦敦价 = 国内价 × 31.1035 ÷ 汇率
                </div>

                <div class="rate-info" id="rate-info">
                    <p>💡 点击计算按钮自动获取最新汇率</p>
                </div>

                <div class="section-title current">🌍 伦敦金 → 国内金</div>

                <div class="form-group">
                    <label class="label-current">
                        <span class="label-icon">🌍</span>
                        伦敦金价格
                    </label>
                    <div class="input-wrapper">
                        <input type="number" id="london-price" placeholder="例如：2650" step="0.01">
                        <span class="unit">USD/oz</span>
                    </div>
                </div>

                <button class="btn" onclick="calculateLondonToCNY()">转换国内金价</button>

                <div class="loading" id="london-loading">
                    <div class="spinner"></div>
                    <p>正在获取实时汇率...</p>
                </div>

                <div class="result" id="london-result">
                    <div class="result-label">国内金价</div>
                    <div class="result-value" id="london-value">--</div>
                    <div class="result-detail" id="london-detail"></div>
                </div>

                <div class="section-title buy" style="margin-top: 30px;">🇨🇳 国内金 → 伦敦金</div>

                <div class="form-group">
                    <label class="label-buy">
                        <span class="label-icon">🇨🇳</span>
                        国内金价
                    </label>
                    <div class="input-wrapper buy">
                        <input type="number" id="cny-price" placeholder="例如：600" step="0.01">
                        <span class="unit">元/克</span>
                    </div>
                </div>

                <button class="btn" onclick="calculateCNYToLondon()">转换伦敦金价</button>

                <div class="result" id="cny-result" style="background: linear-gradient(135deg, #f5a623 0%, #d48806 100%);">
                    <div class="result-label">伦敦金价</div>
                    <div class="result-value" id="cny-value">--</div>
                    <div class="result-detail" id="cny-detail"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>🤖 数据仅供参考，投资需谨慎</p>
        </footer>
    </div>

    <script>
        // 切换 Tab
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        // 从 localStorage 加载数据
        function loadSavedData() {
            const fields = ['current-price', 'current-weight', 'buy-price', 'buy-weight', 'london-price', 'cny-price'];
            fields.forEach(id => {
                const saved = localStorage.getItem('gold-calc-' + id);
                if (saved) {
                    document.getElementById(id).value = saved;
                }
            });
        }

        // 保存数据到 localStorage
        function saveData() {
            const fields = ['current-price', 'current-weight', 'buy-price', 'buy-weight', 'london-price', 'cny-price'];
            fields.forEach(id => {
                const value = document.getElementById(id).value;
                if (value) {
                    localStorage.setItem('gold-calc-' + id, value);
                }
            });
        }

        // 计算均价
        function calculateAverage() {
            const currentPrice = parseFloat(document.getElementById('current-price').value);
            const currentWeight = parseFloat(document.getElementById('current-weight').value);
            const buyPrice = parseFloat(document.getElementById('buy-price').value);
            const buyWeight = parseFloat(document.getElementById('buy-weight').value);

            if (!currentPrice || !currentWeight || !buyPrice || !buyWeight) {
                alert('请填写所有字段！');
                return;
            }

            const totalValue = currentPrice * currentWeight + buyPrice * buyWeight;
            const totalWeight = currentWeight + buyWeight;
            const averagePrice = totalValue / totalWeight;

            const resultDiv = document.getElementById('average-result');
            const valueDiv = document.getElementById('average-value');
            const detailDiv = document.getElementById('average-detail');

            valueDiv.textContent = averagePrice.toFixed(2) + ' 元/克';
            detailDiv.innerHTML = `
                <p>当前持仓价值：${(currentPrice * currentWeight).toFixed(2)} 元</p>
                <p>买入金额：${(buyPrice * buyWeight).toFixed(2)} 元</p>
                <p>总价值：${totalValue.toFixed(2)} 元</p>
                <p>总克数：${totalWeight.toFixed(2)} 克</p>
            `;

            resultDiv.classList.add('show');
            saveData();
        }

        // 获取实时汇率
        async function getExchangeRate() {
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                return data.rates.CNY;
            } catch (error) {
                console.error('获取汇率失败:', error);
                // 备用汇率（如果 API 失败）
                return 7.25;
            }
        }

        // 计算伦敦金 → 国内金
        async function calculateLondonToCNY() {
            const londonPrice = parseFloat(document.getElementById('london-price').value);

            if (!londonPrice) {
                alert('请输入伦敦金价格！');
                return;
            }

            const loadingDiv = document.getElementById('london-loading');
            const resultDiv = document.getElementById('london-result');
            const rateInfoDiv = document.getElementById('rate-info');

            loadingDiv.classList.add('show');
            resultDiv.classList.remove('show');

            // 获取实时汇率
            const exchangeRate = await getExchangeRate();

            loadingDiv.classList.remove('show');

            // 计算：伦敦金 (USD/oz) → 人民币/克
            // 1 盎司 = 31.1035 克
            const cnyPerGram = (londonPrice * exchangeRate) / 31.1035;

            rateInfoDiv.innerHTML = `<p>💱 实时汇率：<strong>1 USD = ${exchangeRate.toFixed(4)} CNY</strong></p>`;

            const valueDiv = document.getElementById('london-value');
            const detailDiv = document.getElementById('london-detail');

            valueDiv.textContent = cnyPerGram.toFixed(2) + ' 元/克';
            detailDiv.innerHTML = `
                <p>伦敦金价：${londonPrice.toFixed(2)} USD/oz</p>
                <p>美元汇率：${exchangeRate.toFixed(4)}</p>
                <p>换算系数：31.1035 (1 盎司=31.1035 克)</p>
                <p>计算：${londonPrice.toFixed(2)} × ${exchangeRate.toFixed(4)} ÷ 31.1035 = ${cnyPerGram.toFixed(2)}</p>
            `;

            resultDiv.classList.add('show');
            saveData();
        }

        // 计算国内金 → 伦敦金
        async function calculateCNYToLondon() {
            const cnyPrice = parseFloat(document.getElementById('cny-price').value);

            if (!cnyPrice) {
                alert('请输入国内金价！');
                return;
            }

            const resultDiv = document.getElementById('cny-result');
            const rateInfoDiv = document.getElementById('rate-info');

            resultDiv.classList.remove('show');

            // 获取实时汇率
            const exchangeRate = await getExchangeRate();

            // 计算：人民币/克 → 伦敦金 (USD/oz)
            // 公式：伦敦价 = 国内价 × 31.1035 ÷ 汇率
            const londonPrice = (cnyPrice * 31.1035) / exchangeRate;

            rateInfoDiv.innerHTML = `<p>💱 实时汇率：<strong>1 USD = ${exchangeRate.toFixed(4)} CNY</strong></p>`;

            const valueDiv = document.getElementById('cny-value');
            const detailDiv = document.getElementById('cny-detail');

            valueDiv.textContent = londonPrice.toFixed(2) + ' USD/oz';
            detailDiv.innerHTML = `
                <p>国内金价：${cnyPrice.toFixed(2)} 元/克</p>
                <p>美元汇率：${exchangeRate.toFixed(4)}</p>
                <p>换算系数：31.1035 (1 盎司=31.1035 克)</p>
                <p>计算：${cnyPrice.toFixed(2)} × 31.1035 ÷ ${exchangeRate.toFixed(4)} = ${londonPrice.toFixed(2)}</p>
            `;

            resultDiv.classList.add('show');
            saveData();
        }

        // 页面加载时恢复数据
        window.onload = loadSavedData;
    </script>
</body>
</html>
